services:
  mcp-toolkit:
    build: .
    container_name: mcp-toolkit
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - ./config:/root/.mcp-toolkit
      - mcp-data:/data
    environment:
      - RUST_LOG=info
      # Add API keys for MCP servers that need them:
      # - GITHUB_PERSONAL_ACCESS_TOKEN=
      # - BRAVE_API_KEY=
      # - SLACK_BOT_TOKEN=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mcp-data:
